server {
    listen 80;
    server_name proxy-0xaq.onrender.com;

    resolver 8.8.8.8 valid=30s;

    location / {
        return 200 'Proxy is live';
        add_header Content-Type text/plain;
    }

    # API 1: Main Backend
    location /api1/ {
        proxy_pass https://smartseatbackend.onrender.com/api/;

        # SNI Fix for Render (Essential to avoid 502)
        proxy_ssl_server_name on;
        proxy_ssl_name smartseatbackend.onrender.com;

        # Standard Proxy Headers
        proxy_set_header Host smartseatbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host proxy-0xaq.onrender.com;

        # Cookie Fixes
        proxy_cookie_domain smartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path /api/ /;
        proxy_cookie_path / /;

        proxy_pass_header Set-Cookie;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # API 2: Exam Portal
    location /api2/ {
        proxy_pass https://examportalsmartseatbackend.onrender.com/;

        proxy_ssl_server_name on;
        proxy_ssl_name examportalsmartseatbackend.onrender.com;

        proxy_set_header Host examportalsmartseatbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host proxy-0xaq.onrender.com;

        proxy_cookie_domain examportalsmartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path / /;

        proxy_pass_header Set-Cookie;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # API 3: Compiler
    location /api3/ {
        proxy_pass https://compilerbackend2.onrender.com/;

        proxy_ssl_server_name on;
        proxy_ssl_name compilerbackend2.onrender.com;

        proxy_set_header Host compilerbackend2.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host proxy-0xaq.onrender.com;

        proxy_cookie_domain compilerbackend2.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path / /;

        proxy_pass_header Set-Cookie;
    }
}