server {
    listen ${PORT};
    server_name _;

    # ✅ Health check (fixes 521)
    location / {
        return 200 'SmartSeat Proxy is Live';
        add_header Content-Type text/plain;
    }

    # ✅ Favicon fix
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # =========================
    # 🔹 Backend 1
    # =========================
    location /api1/ {
        proxy_pass https://smartseatbackend.onrender.com/api/;

        proxy_ssl_server_name on;
        proxy_set_header Host smartseatbackend.onrender.com;

        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cookie_domain smartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path /api/ /;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # =========================
    # 🔹 Backend 2
    # =========================
    location /api2/ {
        proxy_pass https://examportalsmartseatbackend.onrender.com/api/;

        proxy_ssl_server_name on;
        proxy_set_header Host examportalsmartseatbackend.onrender.com;

        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cookie_domain examportalsmartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path /api/ /;

        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;
    }
}