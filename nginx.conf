server {
    listen 80;
    server_name seatwise-gateway.onrender.com;

    # Proxy for Backend 1 (Main API)
    location /api1/ {
        proxy_pass https://smartseatbackend.onrender.com/api/;
        proxy_set_header Host smartseatbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrites the cookie domain so the browser accepts it
        proxy_cookie_domain smartseatbackend.onrender.com seatwise-gateway.onrender.com;
        proxy_pass_header Set-Cookie;
    }

    # Proxy for Backend 2 (AI/Exam Portal)
    location /api2/ {
        proxy_pass https://examportalsmartseatbackend.onrender.com/api/;
        proxy_set_header Host examportalsmartseatbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allows the cookie from BE1 to be sent to BE2
        proxy_cookie_domain examportalsmartseatbackend.onrender.com seatwise-gateway.onrender.com;
        proxy_pass_header Set-Cookie;
    }
}