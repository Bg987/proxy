server {
    listen 80;
    server_name proxy-0xaq.onrender.com;

    # Global CORS settings (The Proxy must handle this now)
    add_header 'Access-Control-Allow-Origin' 'https://your-frontend-domain.onrender.com' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

    # Backend 1: Main
    location /api1/ {
        # Handle preflight OPTIONS requests for CORS
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass https://smartseatbackend.onrender.com/api/;
        proxy_ssl_server_name on;

        # We set the Host to the target server so Render knows where to route it
        proxy_set_header Host smartseatbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # This rewrites the cookie to belong to the PROXY domain
        proxy_cookie_domain smartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path /api/ /;
        proxy_cookie_path / /;
    }

    # Backend 2: Exam
    location /api2/ {
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass https://examportalsmartseatbackend.onrender.com/api/;
        proxy_ssl_server_name on;

        proxy_set_header Host examportalsmartseatbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_cookie_domain examportalsmartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path /api/ /;
        proxy_cookie_path / /;
    }
}