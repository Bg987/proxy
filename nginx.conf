server {
    listen 80;
    server_name proxy-0xaq.onrender.com;

    # DNS Resolver
    resolver 8.8.8.8 valid=30s;

    # Health Check
    location / {
        return 200 'Proxy is live123';
        add_header Content-Type text/plain;
    }

    # Helper for all API locations
    # We use $host to ensure the backend knows the request came through proxy-0xaq.onrender.com

    # Proxy for Backend 1 (Main API)
    location /api1/ {
            proxy_pass https://smartseatbackend.onrender.com/api/;

            proxy_set_header Host smartseatbackend.onrender.com; # Keep the internal host for Render routing
            proxy_set_header X-Forwarded-Host proxy-0xaq.onrender.com; # Tell Spring the REAL host
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_cookie_domain smartseatbackend.onrender.com proxy-0xaq.onrender.com;
            proxy_cookie_path / /;
            proxy_pass_header Set-Cookie;
        }

    # Proxy for Backend 2 (AI/Exam Portal)
    location /api2/ {
        proxy_pass https://examportalsmartseatbackend.onrender.com/;

        proxy_ssl_server_name on;
        proxy_ssl_name examportalsmartseatbackend.onrender.com;

        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        # FIX: Consistency across hosts
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_cookie_domain examportalsmartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path / /;

        proxy_pass_request_headers on;
        proxy_pass_header Set-Cookie;
    }

    # Proxy for Backend 3 (Compiler Backend)
    location /api3/ {
        proxy_pass https://compilerbackend2.onrender.com/;

        proxy_ssl_server_name on;
        proxy_ssl_name compilerbackend2.onrender.com;

        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_cookie_domain compilerbackend2.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path / /;

        proxy_pass_request_headers on;
        proxy_pass_header Set-Cookie;
    }
}