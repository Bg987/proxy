server {
    listen 80;
    server_name proxy-0xaq.onrender.com;

    # DNS Resolver: Helps Nginx find Render domains
    resolver 8.8.8.8 valid=30s;

    # Health Check for Render
    location / {
        return 200 'Proxy is live';
        add_header Content-Type text/plain;
    }

    # Proxy for Backend 1 (Main API)
    location /api1/ {
        proxy_pass https://smartseatbackend.onrender.com/api/;

        # SSL SNI Fix (Crucial for Render)
        proxy_ssl_server_name on;
        proxy_ssl_name smartseatbackend.onrender.com;

        # Timeouts: Gives the Free Tier time to wake up (Wait up to 90s)
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        proxy_set_header Host smartseatbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cookie_domain smartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_pass_header Set-Cookie;
    }

    # Proxy for Backend 2 (AI/Exam Portal)
    location /api2/ {
        proxy_pass https://examportalsmartseatbackend.onrender.com/;

        # SSL SNI Fix (Crucial for Render)
        proxy_ssl_server_name on;
        proxy_ssl_name examportalsmartseatbackend.onrender.com;

        # Timeouts: Wait up to 90s for wake-up
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        proxy_set_header Host examportalsmartseatbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cookie_domain examportalsmartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_pass_header Set-Cookie;
    }
}