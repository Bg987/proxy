server {
    listen 80;
    server_name proxy-0xaq.onrender.com;

    # DNS Resolver is required for Nginx to find Render subdomains dynamically
    resolver 8.8.8.8 valid=30s;

    # Proxy for Backend 1 (Main API)
    location /api1/ {
        proxy_pass https://smartseatbackend.onrender.com/api/;

        proxy_set_header Host smartseatbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fix SSL Handshake for Render
        proxy_ssl_server_name on;
        proxy_ssl_name smartseatbackend.onrender.com;
        proxy_http_version 1.1;

        # Rewrite cookie domain to match YOUR proxy URL
        proxy_cookie_domain smartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_pass_header Set-Cookie;
    }

    # Proxy for Backend 2 (AI/Exam Portal)
    location /api2/ {
        proxy_pass https://examportalsmartseatbackend.onrender.com/api/;

        # Fixed: Removed the trailing slash after .com
        proxy_set_header Host examportalsmartseatbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fix SSL Handshake for Render
        proxy_ssl_server_name on;
        proxy_ssl_name examportalsmartseatbackend.onrender.com;
        proxy_http_version 1.1;

        # Rewrite cookie domain to match YOUR proxy URL
        proxy_cookie_domain examportalsmartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_pass_header Set-Cookie;
    }
}