server {
    listen 80;
    server_name proxy-0xaq.onrender.com;

    # 1. Handle Favicon/Root to avoid 404 logs
    location = /favicon.ico { access_log off; log_not_found off; }

    # 2. Backend 1: Main Functionalities
    location /api1/ {
        # The trailing slash here is vital for path stripping
        proxy_pass https://smartseatbackend.onrender.com/api/;

        proxy_ssl_server_name on;
        proxy_set_header Host smartseatbackend.onrender.com;

        # CRITICAL: Pass the Vercel Origin to Spring Boot for CORS validation
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # COOKIE REWRITING:
        # Changes 'Domain=smartseatbackend.onrender.com' to 'Domain=proxy-0xaq.onrender.com'
        proxy_cookie_domain smartseatbackend.onrender.com proxy-0xaq.onrender.com;
        # Ensures a cookie set on /api/ is available for the whole proxy domain
        proxy_cookie_path /api/ /;
        proxy_cookie_path / /;

        # Prevents Nginx from intercepting error pages from Spring
        proxy_intercept_errors off;
    }

    # 3. Backend 2: Exam Functionalities
    location /api2/ {
        proxy_pass https://examportalsmartseatbackend.onrender.com/api/;

        proxy_ssl_server_name on;
        proxy_set_header Host examportalsmartseatbackend.onrender.com;

        # Pass Origin to allow Spring's @CrossOrigin or SecurityConfig to work
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # COOKIE REWRITING:
        proxy_cookie_domain examportalsmartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path /api/ /;
        proxy_cookie_path / /;

        proxy_intercept_errors off;
    }
}