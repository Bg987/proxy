server {
    listen 0.0.0.0:10000;  # Force it to listen to all network interfaces
    server_name proxy-0xaq.onrender.com;

    # 1. Health Check & Root Handler (FIXES THE 521 ERROR)
    # This ensures Render and Cloudflare get a '200 OK' when pinging the root
    location / {
        return 200 'SmartSeat Proxy is Live';
        add_header Content-Type text/plain;
    }

    # 2. Favicon fix
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # 3. Backend 1: Main Functionalities
    location /api1/ {
        # Trailing slash ensures /api1/login becomes /api/login on the backend
        proxy_pass https://smartseatbackend.onrender.com/api/;

        proxy_ssl_server_name on;
        proxy_set_header Host smartseatbackend.onrender.com;

        # Standard Proxy Headers
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Cookie Management
        proxy_cookie_domain smartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path /api/ /;

        # Buffer settings for larger JSON payloads
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # 4. Backend 2: Exam Functionalities
    location /api2/ {
        proxy_pass https://examportalsmartseatbackend.onrender.com/api/;

        proxy_ssl_server_name on;
        proxy_set_header Host examportalsmartseatbackend.onrender.com;

        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Cookie Management
        proxy_cookie_domain examportalsmartseatbackend.onrender.com proxy-0xaq.onrender.com;
        proxy_cookie_path /api/ /;

        # Timeouts (Crucial for longer exam submissions)
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }
}